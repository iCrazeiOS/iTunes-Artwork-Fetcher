<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>iTunes Artwork Fetcher</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header>
    <div class="search-row">
      <input type="text" id="search" placeholder="Search artwork..." autofocus>
      <select id="entity-type">
        <option value="album">Album</option>
        <option value="movie">Movie</option>
        <option value="tvSeason">TV Show</option>
        <option value="podcast">Podcast</option>
        <option value="musicVideo">Music Video</option>
        <option value="ebook">Book</option>
        <option value="audiobook">Audiobook</option>
        <option value="software">App (iPhone)</option>
        <option value="iPadSoftware">App (iPad)</option>
        <option value="macSoftware">App (Mac)</option>
        <option value="shortFilm">Short Film</option>
      </select>
      <button id="settings-btn" aria-label="Settings">
        <svg width="20" height="20" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
          <path d="M10 2.5a1.5 1.5 0 0 1 1.5 1.5v.3a1.2 1.2 0 0 0 1.8 1l.3-.15a1.5 1.5 0 0 1 2 .55l.5.85a1.5 1.5 0 0 1-.5 2.05l-.25.15a1.2 1.2 0 0 0 0 2.1l.25.15a1.5 1.5 0 0 1 .5 2.05l-.5.85a1.5 1.5 0 0 1-2 .55l-.3-.15a1.2 1.2 0 0 0-1.8 1v.3a1.5 1.5 0 0 1-3 0v-.3a1.2 1.2 0 0 0-1.8-1l-.3.15a1.5 1.5 0 0 1-2-.55l-.5-.85a1.5 1.5 0 0 1 .5-2.05l.25-.15a1.2 1.2 0 0 0 0-2.1l-.25-.15a1.5 1.5 0 0 1-.5-2.05l.5-.85a1.5 1.5 0 0 1 2-.55l.3.15a1.2 1.2 0 0 0 1.8-1V4A1.5 1.5 0 0 1 10 2.5z"/>
          <circle cx="10" cy="10" r="2.5"/>
        </svg>
      </button>
    </div>
    <div id="status"></div>
  </header>

  <div id="settings-popover" class="popover hidden">
    <label>
      Image Resolution (max 1500px)
      <input type="number" id="setting-resolution" min="100" max="1500" step="100" placeholder="600">
    </label>
    <label>
      Default Type
      <select id="setting-default-entity">
        <option value="album">Album</option>
        <option value="movie">Movie</option>
        <option value="tvSeason">TV Show</option>
        <option value="podcast">Podcast</option>
        <option value="musicVideo">Music Video</option>
        <option value="ebook">Book</option>
        <option value="audiobook">Audiobook</option>
        <option value="software">App (iPhone)</option>
        <option value="iPadSoftware">App (iPad)</option>
        <option value="macSoftware">App (Mac)</option>
        <option value="shortFilm">Short Film</option>
      </select>
    </label>
    <label>
      Country
      <select id="setting-country"></select>
    </label>
  </div>

  <main id="grid"></main>

  <div id="preview-overlay" class="hidden">
    <div id="preview-content">
      <img id="preview-img" src="" alt="">
      <div id="preview-info"></div>
    </div>
  </div>

  <div id="context-menu" class="hidden">
    <button data-action="copy">Copy Image</button>
    <button data-action="copy-full">Copy Full Res</button>
    <hr>
    <button data-action="save">Save Image As...</button>
    <button data-action="save-full">Save Full Res As...</button>
    <hr>
    <button data-action="open">Open in Browser</button>
  </div>

  <script type="module" src="app.js"></script>
</body>
</html>
